name: Deploy to Aliyun

# 触发条件：当代码推送到 main 分支时执行
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub 提供的免费云端运行环境

    steps:
    # 1. 检出你的最新代码
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. 将代码通过 SCP 传输到阿里云服务器
    - name: Copy files to Aliyun
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        # 传输所有文件，但排除 .git 和 node_modules，避免传输过慢
        source: ".,!.git,!node_modules" 
        target: "/home/IASP" # 对应你服务器上的代码目录

    # 3. 登录服务器执行安装、编译和重启指令
    - name: Execute deployment commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        script: |
          cd /home/IASP
          echo "开始安装最新依赖..."
          npm install
          echo "开始编译项目..."
          npm run build
          echo "重启 PM2 服务..."
          pm2 restart iasp-app
          echo "部署完成！"
